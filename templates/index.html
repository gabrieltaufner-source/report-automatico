<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report Automático</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }

    .date-input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .date-input-wrap input {
      width: 100%;
      padding: 10px 40px 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      color: #111;
      background: #fafafa;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .date-input-wrap input:focus { border-color: #4f46e5; background: #fff; }

    .date-input-wrap .cal-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #aaa;
      font-size: 16px;
    }

    /* Flatpickr theme override */
    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange { background: #4f46e5 !important; border-color: #4f46e5 !important; }
    .flatpickr-day.inRange { background: #e0e7ff !important; border-color: #e0e7ff !important; }
    .flatpickr-day:hover { background: #e0e7ff !important; }

    /* Checkbox list */
    .client-list {
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      background: #fafafa;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .client-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #f0f0f0;
      user-select: none;
    }

    .client-item:last-child { border-bottom: none; }
    .client-item:hover { background: #f5f3ff; }

    .client-item.todos {
      font-weight: 600;
      color: #4f46e5;
      background: #f5f3ff;
      border-bottom: 1.5px solid #e0e0e0;
    }

    .client-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .client-name { font-size: 14px; color: #111; }
    .client-tipo {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
      background: #e0e7ff;
      color: #4f46e5;
    }
    .client-tipo.lead { background: #dcfce7; color: #16a34a; }

    button {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .erro {
      margin-top: 16px;
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 14px;
      display: none;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Report Automático</h1>
    <p class="subtitle">Gerador de relatórios semanais de marketing digital</p>

    <form id="form">
      <span class="field-label">Clientes</span>
      <div class="client-list">
        <label class="client-item todos">
          <input type="checkbox" id="chk-todos" />
          <span class="client-name">⚡ Todos os clientes</span>
        </label>
        {% for c in clients %}
        <label class="client-item">
          <input type="checkbox" name="clientes" value="{{ c.key }}" class="chk-client" />
          <span class="client-name">{{ c.nome }}</span>
          <span class="client-tipo {% if c.tipo == 'lead' %}lead{% endif %}">{{ c.tipo }}</span>
        </label>
        {% endfor %}
      </div>

      <label class="field-label">Período analisado</label>
      <div class="date-input-wrap">
        <input id="periodo" type="text" placeholder="Selecione o período" readonly required />
        <span class="cal-icon">📅</span>
      </div>

      <label class="field-label">Período comparado</label>
      <div class="date-input-wrap">
        <input id="periodo_comp" type="text" placeholder="Selecione o período" readonly required />
        <span class="cal-icon">📅</span>
      </div>

      <button type="submit" id="btn">Gerar Relatório</button>
      <div class="erro" id="erro"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    // ── Semanas ───────────────────────────────────────────────────
    function getWeekRange(weeksAgo) {
      const now = new Date();
      const day = now.getDay();
      const daysToMon = day === 0 ? 6 : day - 1;
      const monday = new Date(now);
      monday.setDate(now.getDate() - daysToMon - weeksAgo * 7);
      monday.setHours(0,0,0,0);
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      return [monday, sunday];
    }

    function fmt(d) {
      return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    }

    function makePicker(inputId, defaultDates) {
      return flatpickr(document.getElementById(inputId), {
        mode: "range",
        locale: "pt",
        dateFormat: "d/m",
        defaultDate: defaultDates,
        disableMobile: true,
        onReady(_, __, fp) { syncValue(fp); },
        onClose(dates, _, fp) { if (dates.length === 2) syncValue(fp); }
      });

      function syncValue(fp) {
        const d = fp.selectedDates;
        if (d.length === 2) fp.input.value = `${fmt(d[0])} a ${fmt(d[1])}`;
      }
    }

    const fpAnalisado = makePicker("periodo",      getWeekRange(1));
    const fpComparado = makePicker("periodo_comp", getWeekRange(2));

    // ── Todos ─────────────────────────────────────────────────────
    const chkTodos   = document.getElementById("chk-todos");
    const chkClients = document.querySelectorAll(".chk-client");

    chkTodos.addEventListener("change", () => {
      chkClients.forEach(c => c.checked = chkTodos.checked);
    });
    chkClients.forEach(c => c.addEventListener("change", () => {
      chkTodos.checked = [...chkClients].every(c => c.checked);
    }));

    // ── Submit ────────────────────────────────────────────────────
    document.getElementById("form").addEventListener("submit", async function(e) {
      e.preventDefault();
      const btn  = document.getElementById("btn");
      const erro = document.getElementById("erro");
      erro.style.display = "none";

      const selecionados = [...chkClients].filter(c => c.checked).map(c => c.value);
      if (selecionados.length === 0) {
        erro.textContent = "Selecione ao menos um cliente.";
        erro.style.display = "block";
        return;
      }

      const periodo      = document.getElementById("periodo").value.trim();
      const periodo_comp = document.getElementById("periodo_comp").value.trim();
      if (!periodo || !periodo_comp) {
        erro.textContent = "Selecione os dois períodos.";
        erro.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Gerando...";

      try {
        if (selecionados.length === 1) {
          const fd = new FormData();
          fd.append("cliente", selecionados[0]);
          fd.append("periodo", periodo);
          fd.append("periodo_comp", periodo_comp);
          const res = await fetch("/gerar", { method: "POST", body: fd });
          if (!res.ok) { const d = await res.json(); throw new Error(d.erro); }
          _download(await res.blob(), _filename(res, "relatorio.pptx"));
        } else {
          const zip = new JSZip();
          const erros = [];
          for (let i = 0; i < selecionados.length; i++) {
            btn.textContent = `Gerando ${i + 1}/${selecionados.length}...`;
            const fd = new FormData();
            fd.append("cliente", selecionados[i]);
            fd.append("periodo", periodo);
            fd.append("periodo_comp", periodo_comp);
            try {
              const res = await fetch("/gerar", { method: "POST", body: fd });
              if (!res.ok) { const d = await res.json(); throw new Error(d.erro); }
              zip.file(_filename(res, `${selecionados[i]}.pptx`), await res.blob());
            } catch(err) { erros.push(`${selecionados[i]}: ${err.message}`); }
          }
          btn.textContent = "Compactando...";
          const periodoFmt = periodo.replace(/\//g,"-").replace(/ /g,"");
          _download(await zip.generateAsync({ type: "blob" }), `Reports_${periodoFmt}.zip`);
          if (erros.length) {
            erro.textContent = "Alguns relatórios falharam:\n" + erros.join("\n");
            erro.style.display = "block";
          }
        }
      } catch(err) {
        erro.textContent = err.message || "Erro de conexão. Tente novamente.";
        erro.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Gerar Relatório";
    });

    function _filename(res, fallback) {
      const cd = res.headers.get("Content-Disposition") || "";
      const m  = cd.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
      return m ? m[1].replace(/['"]/g,"") : fallback;
    }

    function _download(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
